{% extends "base.html" %}

{% block title %}Map — Finding The Finger{% endblock %}

{% block head %}
<link  rel="stylesheet" href="/static/css/map.css">
<script src="https://unpkg.com/deck.gl@9.0.0/dist.min.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
{% endblock %}

{% block content %}
<div id="map-root" x-data="mapApp()" x-init="init()" x-cloak>

  <!-- Loading overlay -->
  <div id="map-loading" x-show="loading">
    <div class="spinner"></div>
    <span x-text="loadMsg">Loading map data…</span>
  </div>

  <!-- deck.gl canvas -->
  <canvas id="deck-canvas"></canvas>

  <!-- Tooltip -->
  <div id="map-tooltip">
    <div class="tt-ref"  id="tt-ref"></div>
    <div class="tt-trad" id="tt-trad"></div>
    <div class="tt-text" id="tt-text"></div>
  </div>

  <!-- ================================================================
       LEFT SIDEBAR — Layers & Filters
       ================================================================ -->
  <div class="map-left-sidebar" :class="{open: leftOpen}" x-show="!loading">

    <!-- Slide toggle -->
    <button class="left-sidebar-toggle" @click="leftOpen = !leftOpen">
      <span x-text="leftOpen ? '◀ Layers' : '▶ Layers'"></span>
    </button>

    <div class="left-sidebar-header">Layers &amp; Filters</div>

    <div class="left-sidebar-body">

      <!-- Display toggles -->
      <div class="ls-section">Display</div>
      <label class="layer-toggle">
        <input type="checkbox" x-model="layers.kde"          @change="render('toggle')"> Density clouds
      </label>
      <label class="layer-toggle">
        <input type="checkbox" x-model="layers.labels"       @change="render('toggle')"> Tradition labels
      </label>
      <label class="layer-toggle">
        <input type="checkbox" x-model="layers.corpusLabels" @change="render('toggle')"> Corpus labels
      </label>

      <hr class="ls-divider">

      <!-- Run info -->
      <div class="run-info" x-show="runMeta">
        <div x-text="runMeta?.label || 'Projection'"></div>
        <div x-text="runMeta?.created_at ? new Date(runMeta.created_at).toLocaleDateString() : ''"></div>
        <div x-text="`${totalPoints.toLocaleString()} leaves`"></div>
      </div>

      <hr class="ls-divider">

      <!-- Tradition → corpus → height tree -->
      <div class="ls-section">Traditions</div>

      <template x-for="tradName in tradNames" :key="tradName">
        <div>

          <!-- Tradition row -->
          <div class="trad-row">
            <input class="trad-checkbox" type="checkbox"
              :checked="tradState[tradName]?.visible"
              @change.stop="toggleTradition(tradName)">
            <span class="trad-swatch"
              :style="`background:${tradColor(tradName)}`"></span>
            <span class="trad-name" x-text="tradName"></span>
            <span class="trad-chevron"
              :class="{open: tradState[tradName]?.expanded}"
              @click.stop="toggleTradExpand(tradName)">▶</span>
          </div>

          <!-- Expanded: corpus list -->
          <template x-if="tradState[tradName]?.expanded">
            <div class="corpus-block">
              <template
                x-for="corpName in Object.keys(tradState[tradName]?.corpora || {})"
                :key="corpName">
                <div>

                  <!-- Corpus row -->
                  <div class="corpus-row">
                    <input class="corpus-checkbox" type="checkbox"
                      :checked="tradState[tradName]?.corpora[corpName]?.visible"
                      @change.stop="toggleCorpus(tradName, corpName)">
                    <span class="corpus-name" x-text="shortName(corpName)"></span>
                    <span class="corpus-chevron"
                      :class="{open: tradState[tradName]?.corpora[corpName]?.expanded}"
                      @click.stop="toggleCorpusExpand(tradName, corpName)">▶</span>
                  </div>

                  <!-- Expanded: height chips -->
                  <template x-if="tradState[tradName]?.corpora[corpName]?.expanded">
                    <div class="height-toggles">
                      <template
                        x-for="(enabled, h) in tradState[tradName]?.corpora[corpName]?.heights || {}"
                        :key="h">
                        <label class="height-chip" :class="{active: enabled}">
                          <input type="checkbox" :checked="enabled"
                            @change.stop="toggleHeight(tradName, corpName, parseInt(h))">
                          <span x-text="levelName(mapData?.corpora?.indexOf(corpName), parseInt(h))"></span>
                        </label>
                      </template>
                    </div>
                  </template>

                </div>
              </template>
            </div>
          </template>

        </div>
      </template>

    </div><!-- /left-sidebar-body -->
  </div><!-- /left sidebar -->

  <!-- ================================================================
       RIGHT SIDEBAR — Search
       ================================================================ -->
  <div class="map-sidebar" :class="{open: sidebarOpen}" x-show="!loading">

    <button class="sidebar-toggle" @click="sidebarOpen = !sidebarOpen">
      <span x-text="sidebarOpen ? '▶ Search' : '◀ Search'"></span>
    </button>

    <div class="sidebar-header">
      <h3>Search</h3>

      <div class="sidebar-tabs">
        <button class="sidebar-tab" :class="{active: searchTab==='history'}" @click="searchTab='history'">History</button>
        <button class="sidebar-tab" :class="{active: searchTab==='verse'}"   @click="searchTab='verse'">Verse</button>
        <button class="sidebar-tab" :class="{active: searchTab==='text'}"    @click="searchTab='text'">Free text</button>
      </div>

      <!-- History tab actions -->
      <div x-show="searchTab==='history' && history.length > 0" style="display:flex;gap:0.4rem;margin-bottom:0.4rem">
        <button class="sidebar-btn secondary" style="flex:1" @click="history=[]">Clear history</button>
      </div>

      <!-- Verse tab -->
      <div x-show="searchTab==='verse'">
        <div class="sidebar-search-row">
          <select x-model="selectedCorpus" @change="acValid=false; refInput=''; acItems=[]">
            <template x-for="c in corpora" :key="c.corpus">
              <option :value="c.corpus" x-text="shortName(c.corpus)"></option>
            </template>
          </select>
          <div class="ac-wrap" @click.outside="acOpen=false">
            <input type="text" x-model="refInput" autocomplete="off" placeholder="e.g. John 3:16"
              @focus="acFocus()" @input="acInput()" @keydown="acKeydown($event)" />
            <div x-show="acOpen" class="autocomplete-dropdown">
              <template x-if="acItems.length === 0">
                <div class="ac-empty">No matches</div>
              </template>
              <template x-for="(item, i) in acItems" :key="i">
                <div class="ac-item" :class="{active: acActive===i}"
                  @mousedown.prevent="acSelect(item)" x-text="item"></div>
              </template>
            </div>
          </div>
        </div>
        <button class="sidebar-btn" style="margin-bottom:0.4rem"
          :disabled="searchLoading || !acValid"
          @click="doVerseSearch()">
          <span x-show="!searchLoading">Find similar</span>
          <span x-show="searchLoading">Searching…</span>
        </button>
      </div>

      <!-- Free text tab -->
      <div x-show="searchTab==='text'">
        <input type="text" x-model="queryInput" placeholder="e.g. Love your enemies"
          style="font-size:0.85rem;margin-bottom:0.5rem"
          @keydown.enter="doTextSearch()" />
        <button class="sidebar-btn" style="margin-bottom:0.4rem"
          :disabled="searchLoading || !queryInput.trim()"
          @click="doTextSearch()">
          <span x-show="!searchLoading">Search</span>
          <span x-show="searchLoading">Searching…</span>
        </button>
      </div>

      <!-- Show all / clear -->
      <div style="display:flex;gap:0.4rem" x-show="results.length > 0">
        <button class="sidebar-btn secondary" style="flex:1" @click="fitResults()">Show all</button>
        <button class="sidebar-btn secondary" style="flex:1" @click="clearResults()">Clear</button>
      </div>
    </div>

    <!-- Sidebar body -->
    <div class="sidebar-body">

      <!-- History tab -->
      <template x-if="searchTab==='history'">
        <div>
          <div class="sidebar-status" x-show="history.length === 0">
            Click any verse on the map to add it here.
          </div>
          <template x-for="r in history" :key="r.unit_id">
            <div class="sidebar-result" :class="{active: activeResult===r.unit_id}"
              @mouseenter="hoverResult(r)" @mouseleave="unhoverResult()">
              <div class="sr-ref" :style="`color:${tradColor(r.tradition)}`" x-text="r.label || ''"></div>
              <div class="sr-trad" x-text="`${r.tradition} · ${shortName(r.corpus)}`"></div>
              <div class="sr-text" x-text="r.text"></div>
              <button class="sidebar-btn secondary" style="margin-top:0.4rem;font-size:0.78rem;padding:0.3rem 0.5rem"
                @click.stop="doVerseSearchFor(r.corpus, r.label)">Find similar</button>
            </div>
          </template>
        </div>
      </template>

      <!-- Verse / free text results -->
      <template x-if="searchTab !== 'history'">
        <div>
          <div class="sidebar-status" x-show="!searchLoading && results.length === 0 && searched">
            No results found.
          </div>
          <div class="sidebar-status" x-show="!searched && results.length === 0">
            Search for a verse or phrase to highlight it on the map.
          </div>
          <div class="sidebar-status" x-show="searchLoading">
            <span class="spinner" style="width:1.1rem;height:1.1rem;border-width:2px;display:inline-block;vertical-align:middle;margin-right:0.4rem"></span>
            Searching…
          </div>
          <template x-for="r in results" :key="r.unit_id">
            <div class="sidebar-result" :class="{active: activeResult===r.unit_id}"
              @mouseenter="hoverResult(r)" @mouseleave="unhoverResult()"
              @click="selectResult(r)">
              <div class="sr-ref" :style="`color:${tradColor(r.tradition)}`" x-text="r.label || ''"></div>
              <div class="sr-trad" x-text="`${r.tradition} · ${shortName(r.corpus)}`"></div>
              <div class="sr-text" x-text="r.text"></div>
              <div class="sr-sim" x-show="r.similarity != null"
                x-text="`${(r.similarity*100).toFixed(1)}% similar`"></div>
            </div>
          </template>
        </div>
      </template>

    </div>

  </div><!-- /right sidebar -->

  <!-- Perf overlay -->
  <div x-show="!loading" style="position:absolute;bottom:0.5rem;left:1rem;font-size:0.7rem;
       color:var(--muted);font-family:monospace;pointer-events:none;opacity:0.7">
    renders: <span x-text="_renderCount"></span>
    &nbsp;last: <span x-text="_lastRenderMs.toFixed(1)"></span>ms
    &nbsp;pts: <span x-text="_activePoints.length.toLocaleString()"></span>
  </div>

</div><!-- /map-root -->
{% endblock %}

{% block scripts %}
<script src="/static/js/map.js"></script>
{% endblock %}
