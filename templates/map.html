{% extends "base.html" %}

{% block title %}Map — Finding The Finger{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/css/map.css">
<script src="https://unpkg.com/deck.gl@9.0.0/dist.min.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
{% endblock %}

{% block content %}
<div id="map-root" x-data="mapApp" x-cloak>

  <!-- Loading overlay -->
  <div id="map-loading" x-show="loading">
    <div class="spinner"></div>
    <span x-text="loadMsg">Loading map data…</span>
  </div>

  <!-- deck.gl canvas -->
  <canvas id="deck-canvas"></canvas>

  <!-- Tooltip -->
  <div id="map-tooltip">
    <div class="tt-ref"  id="tt-ref"></div>
    <div class="tt-trad" id="tt-trad"></div>
    <div class="tt-text" id="tt-text"></div>
  </div>

  <!-- ================================================================
       LEFT SIDEBAR — Layers & Filters
       ================================================================ -->
  <div class="map-left-sidebar" :class="{open: leftOpen}" x-show="!loading">

    <button class="left-sidebar-toggle" @click="leftOpen = !leftOpen">
      <span x-text="leftOpen ? '◀ Layers' : '▶ Layers'"></span>
    </button>

    <div class="left-sidebar-header">Layers &amp; Filters</div>

    <div class="left-sidebar-body">

      <!-- Height range slider -->
      <template x-if="globalMaxHeight > 0">
        <div class="ls-slider-section">
          <div class="ls-slider-labels">
            <span>Passage</span>
            <span>Corpus</span>
          </div>
          <div class="range-slider-wrap">
            <div class="range-track-bg">
              <div class="range-track-fill"
                :style="`left:${sliderMin/globalMaxHeight*100}%;right:${(1-sliderMax/globalMaxHeight)*100}%`">
              </div>
            </div>
            <input type="range" class="range-handle"
              :min="0" :max="globalMaxHeight" step="1"
              x-model.number="sliderMin"
              @mousedown="sliderLastMoved='min'"
              @input="onSliderMinChange()"
              :style="`z-index:${sliderLastMoved==='min'?3:2}`">
            <input type="range" class="range-handle"
              :min="0" :max="globalMaxHeight" step="1"
              x-model.number="sliderMax"
              @mousedown="sliderLastMoved='max'"
              @input="onSliderMaxChange()"
              :style="`z-index:${sliderLastMoved==='max'?3:2}`">
          </div>
          <button class="ls-apply-btn" :class="{pending: sliderPending}" @click="applySlider()">
            Apply to all
          </button>
        </div>
      </template>

      <hr class="ls-divider">

      <!-- Run info + global controls -->
      <div class="ls-meta-row">
        <div class="run-info" x-show="runMeta">
          <span x-text="runMeta?.created_at ? new Date(runMeta.created_at).toLocaleDateString() : ''"></span>
          <span x-text="`· ${totalPoints.toLocaleString()} leaves`"></span>
        </div>
        <div class="ls-global-btns">
          <button class="ls-pill-btn" @click="showAll()">Show all</button>
          <button class="ls-pill-btn" @click="hideAll()">Hide all</button>
        </div>
      </div>

      <hr class="ls-divider">

      <!-- Corpus tree, grouped by tradition -->
      <template x-for="tradName in tradNames" :key="tradName">
        <div class="trad-section">

          <!-- Tradition header — label only, no controls -->
          <div class="trad-label-row">
            <span class="trad-dot" :style="`background:${tradColor(tradName)}`"></span>
            <span class="trad-label-text" x-text="tradName"></span>
          </div>

          <!-- Corpus list (always expanded) -->
          <div class="corpus-list">
            <template
              x-for="corpName in Object.keys(tradState[tradName]?.corpora || {})"
              :key="corpName">
              <div class="corpus-card">

                <!-- Corpus controls -->
                <div class="corpus-ctrl-row">
                  <span class="corpus-label" x-text="shortName(corpName)"></span>
                  <div class="corpus-btns">
                    <button class="ctrl-btn"
                      :class="{active: tradState[tradName]?.corpora[corpName]?.scatter}"
                      @click.stop="toggleCorpusScatter(tradName, corpName)"
                      title="Scatter points">⬤</button>
                    <button class="ctrl-btn"
                      :class="{active: tradState[tradName]?.corpora[corpName]?.labels}"
                      @click.stop="toggleCorpusLabels(tradName, corpName)"
                      title="Map label">A</button>
                    <button class="ctrl-btn"
                      :class="{active: tradState[tradName]?.corpora[corpName]?.kde}"
                      @click.stop="toggleCorpusKde(tradName, corpName)"
                      title="Density cloud">≋</button>
                    <button class="ctrl-btn solo-btn"
                      :class="{active: isSoloed(tradName, corpName)}"
                      @click.stop="toggleSolo(tradName, corpName)">solo</button>
                  </div>
                </div>

                <!-- Height chips — only shown when corpus has multiple levels -->
                <div x-show="Object.keys(tradState[tradName]?.corpora[corpName]?.heights || {}).length > 1"
                  class="height-chips">
                  <template
                    x-for="(enabled, h) in (tradState[tradName]?.corpora[corpName]?.heights || {})"
                    :key="h">
                    <label class="height-chip" :class="{active: enabled}">
                      <input type="checkbox" :checked="enabled"
                        @change.stop="toggleHeight(tradName, corpName, parseInt(h))">
                      <span x-text="levelName(mapData?.corpora?.indexOf(corpName), parseInt(h))"></span>
                    </label>
                  </template>
                </div>

              </div>
            </template>
          </div>

        </div>
      </template>

    </div><!-- /left-sidebar-body -->
  </div><!-- /left sidebar -->

  <!-- ================================================================
       RIGHT SIDEBAR — Search
       ================================================================ -->
  <div class="map-sidebar" :class="{open: sidebarOpen}" x-show="!loading">

    <button class="sidebar-toggle" @click="sidebarOpen = !sidebarOpen">
      <span x-text="sidebarOpen ? '▶ Search' : '◀ Search'"></span>
    </button>

    <div class="sidebar-header">
      <h3>Search</h3>

      <div class="sidebar-tabs">
        <button class="sidebar-tab" :class="{active: searchTab==='history'}"  @click="searchTab='history'">History</button>
        <button class="sidebar-tab" :class="{active: searchTab==='passage'}"  @click="searchTab='passage'">Passage</button>
        <button class="sidebar-tab" :class="{active: searchTab==='text'}"     @click="searchTab='text'">Free text</button>
      </div>

      <!-- History tab actions -->
      <div x-show="searchTab==='history' && history.length > 0" style="display:flex;gap:0.4rem;margin-bottom:0.4rem">
        <button class="sidebar-btn secondary" style="flex:1" @click="history=[]">Clear history</button>
      </div>

      <!-- Passage tab -->
      <div x-show="searchTab==='passage'">
        <div class="sidebar-search-row">
          <select x-model="selectedCorpus" @change="acValid=false; acSelectedNode=null; refInput=''; acItems=[]">
            <template x-for="c in corpora" :key="c.corpus">
              <option :value="c.corpus" x-text="shortName(c.corpus)"></option>
            </template>
          </select>
          <div class="ac-wrap" @click.outside="acOpen=false">
            <input type="text" x-model="refInput" autocomplete="off" placeholder="e.g. John 3:16"
              @focus="acFocus()" @input="acInput()" @keydown="acKeydown($event)" />
            <div x-show="acOpen" class="autocomplete-dropdown">
              <template x-if="acItems.length === 0">
                <div class="ac-empty">No matches</div>
              </template>
              <template x-for="(item, i) in acItems" :key="item.id">
                <div class="ac-item" :class="{active: acActive===i}"
                  :style="`padding-left:${0.6 + item.depth * 0.8}rem`"
                  @mousedown.prevent="acSelect(item)">
                  <span x-text="item.label"></span>
                  <span class="ac-level" x-text="item.level_name"></span>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- Height pills — shown after a passage is selected -->
        <div x-show="acSelectedNode" class="height-pills" style="margin-bottom:0.5rem">
          <span class="height-pill-label">Find similar at:</span>
          <template x-for="h in (acSelectedNode ? Object.keys(mapData?.corpus_levels?.[mapData?.corpora?.indexOf(selectedCorpus)] || {}).map(Number).sort() : [])" :key="h">
            <button class="height-pill"
              :class="{active: similarHeight === h}"
              @click="similarHeight = h"
              x-text="levelName(mapData?.corpora?.indexOf(selectedCorpus), h)">
            </button>
          </template>
        </div>

        <button class="sidebar-btn" style="margin-bottom:0.4rem"
          :disabled="searchLoading || !acValid"
          @click="doPassageSearch()">
          <span x-show="!searchLoading">Find similar</span>
          <span x-show="searchLoading">Searching…</span>
        </button>
      </div>

      <!-- Free text tab -->
      <div x-show="searchTab==='text'">
        <input type="text" x-model="queryInput" placeholder="e.g. Love your enemies"
          style="font-size:0.85rem;margin-bottom:0.5rem"
          @keydown.enter="doTextSearch()" />
        <button class="sidebar-btn" style="margin-bottom:0.4rem"
          :disabled="searchLoading || !queryInput.trim()"
          @click="doTextSearch()">
          <span x-show="!searchLoading">Search</span>
          <span x-show="searchLoading">Searching…</span>
        </button>
      </div>

      <!-- Show all / clear -->
      <div style="display:flex;gap:0.4rem" x-show="results.length > 0">
        <button class="sidebar-btn secondary" style="flex:1" @click="fitResults()">Show all</button>
        <button class="sidebar-btn secondary" style="flex:1" @click="clearResults()">Clear</button>
      </div>
    </div>

    <!-- Sidebar body -->
    <div class="sidebar-body">

      <!-- History tab -->
      <template x-if="searchTab==='history'">
        <div>
          <div class="sidebar-status" x-show="history.length === 0">
            Click any verse on the map to add it here.
          </div>
          <template x-for="r in history" :key="r.unit_id">
            <div class="sidebar-result" :class="{active: activeResult===r.unit_id}"
              @mouseenter="hoverResult(r)" @mouseleave="unhoverResult()">
              <div class="sr-ref" :style="`color:${tradColor(r.tradition)}`" x-text="r.label || ''"></div>
              <div class="sr-trad" x-text="`${r.tradition} · ${shortName(r.corpus)}`"></div>
              <div class="sr-text" x-text="r.text"></div>
              <button class="sidebar-btn secondary" style="margin-top:0.4rem;font-size:0.78rem;padding:0.3rem 0.5rem"
                @click.stop="doSimilarSearch(r.unit_id, r.height)">Find similar</button>
            </div>
          </template>
        </div>
      </template>

      <!-- Passage / free text results -->
      <template x-if="searchTab !== 'history'">
        <div>
          <div class="sidebar-status" x-show="!searchLoading && results.length === 0 && searched">
            No results found.
          </div>
          <div class="sidebar-status" x-show="!searched && results.length === 0">
            Search for a verse or phrase to highlight it on the map.
          </div>
          <div class="sidebar-status" x-show="searchLoading">
            <span class="spinner" style="width:1.1rem;height:1.1rem;border-width:2px;display:inline-block;vertical-align:middle;margin-right:0.4rem"></span>
            Searching…
          </div>
          <template x-for="r in results" :key="r.unit_id">
            <div class="sidebar-result" :class="{active: activeResult===r.unit_id}"
              @mouseenter="hoverResult(r)" @mouseleave="unhoverResult()"
              @click="selectResult(r)">
              <div style="display:flex;align-items:baseline;gap:0.4rem;margin-bottom:0.2rem">
                <div class="sr-ref" :style="`color:${tradColor(r.tradition)}`" x-text="r.label || ''"></div>
                <span class="sr-level" x-show="r.height > 0"
                  x-text="levelName(mapData?.corpora?.indexOf(r.corpus), r.height)"></span>
              </div>
              <div class="sr-trad" x-text="`${r.tradition} · ${shortName(r.corpus)}`"></div>
              <div class="sr-text" x-text="r.text"></div>
              <div class="sr-sim" x-show="r.similarity != null"
                x-text="`${(r.similarity*100).toFixed(1)}% similar`"></div>
              <button class="sidebar-btn secondary" style="margin-top:0.4rem;font-size:0.78rem;padding:0.3rem 0.5rem"
                @click.stop="doSimilarSearch(r.unit_id, r.height)">Find similar</button>
            </div>
          </template>
        </div>
      </template>

    </div>

  </div><!-- /right sidebar -->

  <!-- Perf overlay -->
  <div x-show="!loading" style="position:absolute;bottom:0.5rem;left:1rem;font-size:0.7rem;
       color:var(--muted);font-family:monospace;pointer-events:none;opacity:0.7">
    renders: <span x-text="_renderCount"></span>
    &nbsp;last: <span x-text="_lastRenderMs.toFixed(1)"></span>ms
    &nbsp;pts: <span x-text="_activePoints.length.toLocaleString()"></span>
  </div>

</div><!-- /map-root -->
{% endblock %}

{% block scripts %}
<script type="module" src="/static/dist/map.js"></script>
{% endblock %}
