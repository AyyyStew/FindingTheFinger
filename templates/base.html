<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Finding The Finger{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="/static/assets/logo.ico">
  <link rel="stylesheet" href="/static/css/base.css">
  {% block head %}{% endblock %}
</head>

<body>

  <nav class="site-nav">
    <a href="/" class="site-nav-brand">
      <img src="/static/assets/logo.svg" alt=""
        style="width:28px;height:28px;display:inline-block;flex-shrink:0">Finding The Finger</a>
    <div class="site-nav-divider"></div>
    <div class="site-nav-links">
      <a href="/" class="nav-link {% if page == 'search' %}active{% endif %}">Search</a>
      <a href="/map" class="nav-link {% if page == 'map' %}active{% endif %}">Map</a>
      <a href="/about" class="nav-link {% if page == 'about' %}active{% endif %}">About</a>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer class="site-footer">
    Finding The Finger &mdash; semantic search across sacred texts
  </footer>

  {% block scripts %}{% endblock %}

</body>

</html>
