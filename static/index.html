<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finding The Finger: Verse Similarity Search</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #6c8cff;
      --accent2: #a78bfa;
      --text: #e2e4f0;
      --muted: #7a7f9a;
      --success: #4ade80;
      --card-hover: #252940;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Site nav */
    .site-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .site-nav-brand {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .site-nav-divider {
      width: 1px;
      height: 18px;
      background: var(--border);
    }

    .site-nav-sub {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* Site footer */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: auto;
      flex-shrink: 0;
    }

    /* Page header */
    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .page-header p {
      color: var(--muted);
      margin-top: 0.35rem;
      font-size: 0.88rem;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1rem;
      flex: 1;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.25rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.35rem;
      margin-bottom: 1.75rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.6rem 1rem;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: var(--surface2);
      color: var(--text);
    }

    .tab-btn:hover:not(.active) {
      color: var(--text);
    }

    /* Search form */
    .search-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .field {
      margin-bottom: 1.1rem;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 0.6rem 0.85rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: var(--accent);
    }

    select option {
      background: var(--surface2);
    }

    .row {
      display: flex;
      gap: 1rem;
    }

    .row .field {
      flex: 1;
    }

    /* Slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
      height: 4px;
      cursor: pointer;
    }

    .slider-val {
      min-width: 2.5rem;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent);
    }

    /* Filters */
    .filters-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }

    .filters-section h3,
    .filters-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 0.85rem;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
      color: var(--muted);
    }

    .chip input[type="checkbox"] { display: none; }

    .chip .chip-icon { font-size: 0.9rem; line-height: 1; }

    .chip.dim { opacity: 0.4; }

    /* Autocomplete */
    .autocomplete-wrap {
      position: relative;
    }

    .autocomplete-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 7px;
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .ac-item {
      padding: 0.55rem 0.85rem;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--text);
    }

    .ac-item:hover,
    .ac-item.active {
      background: rgba(108, 140, 255, 0.15);
      color: var(--accent);
    }

    .ac-empty {
      padding: 0.55rem 0.85rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Button */
    .search-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.25rem;
      transition: opacity 0.15s;
    }

    .search-btn:hover {
      opacity: 0.88;
    }

    .search-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* Results */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.85rem;
    }

    .results-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
    }

    .results-header .count {
      color: var(--accent);
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 0.75rem;
      transition: background 0.1s;
    }

    .result-card:hover {
      background: var(--card-hover);
    }

    .result-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }

    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      letter-spacing: 0.03em;
    }

    .badge-tradition,
    .badge-corpus {
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .ref {
      font-size: 0.82rem;
      color: var(--muted);
      margin-left: auto;
    }

    .similarity-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.55rem;
    }

    .bar-track {
      flex: 1;
      height: 3px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .sim-score {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--success);
      min-width: 3rem;
      text-align: right;
    }

    .result-text {
      font-size: 0.92rem;
      line-height: 1.6;
      color: #c8cbdf;
    }

    /* Status */
    .status {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status.error {
      color: #f87171;
    }

    .spinner {
      display: inline-block;
      width: 1.2rem;
      height: 1.2rem;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Load more */
    .load-more-btn {
      display: block;
      width: 100%;
      padding: 0.7rem;
      margin-top: 0.5rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .load-more-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .load-more-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* Source verse card */
    .source-card {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 0 1px rgba(108, 140, 255, 0.1);
    }

    .source-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }

    .source-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-right: 0.25rem;
    }

    [x-cloak] {
      display: none !important;
    }
  </style>
</head>

<body>

  <nav class="site-nav">
    <span class="site-nav-brand">Finding The Finger</span>
    <div class="site-nav-divider"></div>
    <span class="site-nav-sub">Verse Similarity Search</span>
  </nav>

  <div x-data="app()" x-init="init()" x-cloak class="container">

    <header class="page-header">
      <h1>Verse Similarity Search</h1>
      <p>Find semantically similar passages across sacred traditions</p>
    </header>

    <!-- Control panel -->
    <div class="search-card" style="margin-bottom:1.5rem">

      <!-- Tabs -->
      <div class="tabs" style="margin-bottom:1.25rem">
        <button class="tab-btn" :class="{active: activeTab==='verse'}" @click="activeTab='verse'">Verse Lookup</button>
        <button class="tab-btn" :class="{active: activeTab==='text'}" @click="activeTab='text'">Free Text Search</button>
      </div>

      <!-- Verse inputs -->
      <div x-show="activeTab==='verse'">
        <div class="row">
          <div class="field">
            <label>Corpus</label>
            <select x-model="selectedCorpus" @change="acOpen=false; acValid=false; refInput=''; sourceVerse=null">
              <template x-for="c in corpora" :key="c.corpus">
                <option :value="c.corpus" x-text="`${c.corpus} (${c.tradition})`"></option>
              </template>
            </select>
          </div>
          <div class="field">
            <label>Reference</label>
            <div class="autocomplete-wrap" @click.outside="acOpen=false">
              <input type="text" x-model="refInput" autocomplete="off" placeholder="e.g. John 3:16"
                @focus="acFocus()" @input="acInput()" @keydown="acKeydown($event)" />
              <div x-show="acOpen" class="autocomplete-dropdown">
                <template x-if="acItems.length === 0">
                  <div class="ac-empty">No matches</div>
                </template>
                <template x-for="(item, i) in acItems" :key="i">
                  <div class="ac-item" :class="{active: acActive===i}" @mousedown.prevent="acSelect(item)"
                    x-text="item"></div>
                </template>
              </div>
            </div>
          </div>
        </div>
        <div x-show="sourceVerse" class="source-card" style="margin-top:1rem">
          <div class="source-header">
            <span class="source-label">Verse</span>
            <span class="badge badge-tradition" :style="tradBadgeStyle(sourceVerse?.tradition)">
              <span x-text="tradEmoji(sourceVerse?.tradition)"></span>
              <span x-text="sourceVerse?.tradition"></span>
            </span>
            <span class="badge badge-corpus" :style="corpusBadgeStyle(sourceVerse?.corpus, sourceVerse?.tradition)">
              <span x-text="corpusEmoji(sourceVerse?.corpus, sourceVerse?.tradition)"></span>
              <span x-text="shortName(sourceVerse?.corpus || '')"></span>
            </span>
            <span class="ref" x-text="sourceVerse?.unit_label"></span>
          </div>
          <div class="result-text" x-text="sourceVerse?.text"></div>
        </div>
      </div>

      <!-- Free text input -->
      <div x-show="activeTab==='text'">
        <div class="field" style="margin-bottom:0">
          <label>Query</label>
          <input type="text" x-model="queryInput" placeholder="e.g. Love your enemies and pray for them"
            @keydown.enter="doTextSearch()" />
        </div>
      </div>

      <!-- Divider -->
      <hr style="border:none;border-top:1px solid var(--border);margin:1.25rem 0">

      <!-- Tradition & corpus filters -->
      <div x-show="corpora.length > 0">
        <div class="filters-label">Tradition</div>
        <div class="filter-chips" style="margin-bottom:0.75rem">
          <template x-for="t in traditions" :key="t">
            <label class="chip" :class="{checked: tradEnabled[t]}"
              :style="tradEnabled[t] ? `background:${tradColor(t)};border-color:${tradColor(t)};color:#0f1117` : ''"
              @click.prevent="toggleTradition(t)">
              <input type="checkbox" :checked="tradEnabled[t]" @click.stop />
              <span class="chip-icon" x-text="tradEmoji(t)"></span>
              <span x-text="t"></span>
            </label>
          </template>
        </div>
        <div class="filters-label">Corpus</div>
        <div class="filter-chips">
          <template x-for="c in corpora" :key="c.corpus">
            <label class="chip" :class="{checked: corpusEnabled[c.corpus], dim: !tradEnabled[c.tradition]}"
              :style="corpusEnabled[c.corpus] ? `background:${tradColor(c.tradition)};border-color:${tradColor(c.tradition)};color:#0f1117` : ''"
              :title="c.corpus" @click.prevent="toggleCorpus(c.corpus, c.tradition)">
              <input type="checkbox" :checked="corpusEnabled[c.corpus]" @click.stop />
              <span class="chip-icon" x-text="corpusEmoji(c.corpus, c.tradition)"></span>
              <span x-text="shortName(c.corpus)"></span>
            </label>
          </template>
        </div>
      </div>

      <!-- Search button -->
      <button class="search-btn" style="margin-top:1.25rem"
        :disabled="loading || (activeTab==='verse' ? !acValid : !queryInput.trim())"
        @click="activeTab==='verse' ? doVerseSearch() : doTextSearch()">
        Search
      </button>

    </div>

    <div id="results-anchor"></div>

    <!-- Loading -->
    <div x-show="loading" class="status">
      <span class="spinner"></span>Searching…
    </div>

    <!-- Error -->
    <div x-show="!loading && errorMsg" class="status error" x-text="errorMsg"></div>

    <!-- No results -->
    <div x-show="!loading && !errorMsg && searched && cards.length === 0" class="status">
      No results found.
    </div>

    <!-- Results -->
    <div x-show="cards.length > 0">
      <div class="results-header">
        <h2>Results</h2>
        <span class="count" x-text="`${cards.length} shown`"></span>
      </div>

      <template x-for="r in cards" :key="r.passage_id">
        <div class="result-card">
          <div class="result-meta">
            <span class="badge badge-tradition" :style="tradBadgeStyle(r.tradition)">
              <span x-text="tradEmoji(r.tradition)"></span>
              <span x-text="r.tradition"></span>
            </span>
            <span class="badge badge-corpus" :style="corpusBadgeStyle(r.corpus, r.tradition)">
              <span x-text="corpusEmoji(r.corpus, r.tradition)"></span>
              <span x-text="shortName(r.corpus)"></span>
            </span>
            <span class="ref" x-text="r.unit_label || ''"></span>
          </div>
          <div class="similarity-bar">
            <div class="bar-track">
              <div class="bar-fill" :style="`width:${(r.similarity*100).toFixed(1)}%`"></div>
            </div>
            <span class="sim-score" x-text="`${(r.similarity*100).toFixed(1)}%`"></span>
          </div>
          <div class="result-text" x-text="r.text"></div>
        </div>
      </template>

      <button class="load-more-btn" x-show="hasMore" :disabled="loading" @click="loadMore()">Load more</button>
    </div>

  </div><!-- /x-data -->

  <script>
    // ---- Tradition & corpus iconography ----

    const TRADITION_CONFIG = {
      // emoji: Unicode/emoji symbol  color: fills chip bg when selected, tints badge
      'Abrahamic':   { emoji: '📜', color: '#f5c518' }, // golden yellow — scroll (neutral across all Abrahamic texts)
      'Buddhist':    { emoji: '☸',  color: '#fb923c' }, // saffron orange — dharma wheel (U+2638)
      'Confucian':   { emoji: '📖', color: '#34d399' }, // emerald green — open book (no dedicated Confucian symbol)
      'Dharmic':     { emoji: '🕉', color: '#c084fc' }, // purple — Om (U+1F549)
      'Norse':       { emoji: '🔨', color: '#93c5fd' }, // steel blue — hammer (Mjolnir)
      'Shinto':      { emoji: '⛩', color: '#f9a8d4' }, // cherry blossom pink — torii gate (U+26E9)
      'Sikh':        { emoji: '☬',  color: '#22d3ee' }, // cyan — Khanda (U+262C, may not render on all devices)
      'Taoist':      { emoji: '☯',  color: '#d4d4d8' }, // near-white — yin yang (U+262F)
      'Zoroastrian': { emoji: '🔥', color: '#f87171' }, // red — fire
    };

    // Per-corpus overrides (tradition emoji is used as fallback)
    const CORPUS_EMOJI_MAP = {
      'Bible — KJV (King James Version)': '✝️',
      'Quran (Clear Quran Translation)':  '☪️',
    };

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function app() {
      return {
        // Corpus data & filter state
        corpora: [],
        tradEnabled: {},
        corpusEnabled: {},

        // Search inputs
        activeTab: 'verse',
        selectedCorpus: '',
        refInput: '',
        queryInput: '',
        // Pagination
        PAGE_SIZE: 50,
        cards: [],
        apiOffset: 0,
        apiHasMore: true,
        lastParams: null,

        // UI state
        loading: false,
        errorMsg: '',
        searched: false,
        sourceVerse: null,   // {text, unit_label, corpus, tradition} for verse searches

        // Autocomplete
        acItems: [],
        acActive: -1,
        acOpen: false,
        acValid: false,   // true only when refInput came from the dropdown
        _acTimer: null,

        // ---- Init ----

        async init() {
          try {
            const data = await fetch('/corpora').then(r => r.json());
            this.corpora = data;
            if (data.length) this.selectedCorpus = data[0].corpus;

            const te = {}, ce = {};
            data.forEach(c => { te[c.tradition] = true; ce[c.corpus] = true; });
            this.tradEnabled = te;
            this.corpusEnabled = ce;
          } catch (e) {
            console.error('Failed to load corpora', e);
          }
        },

        // ---- Derived ----

        get traditions() {
          return [...new Set(this.corpora.map(c => c.tradition))].sort();
        },

        get hasMore() {
          return this.apiHasMore;
        },

        tradColor(t) { return TRADITION_CONFIG[t]?.color || 'var(--accent)'; },
        tradEmoji(t) { return TRADITION_CONFIG[t]?.emoji || '📖'; },

        corpusEmoji(corpus, tradition) {
          return CORPUS_EMOJI_MAP[corpus] || this.tradEmoji(tradition);
        },

        tradBadgeStyle(t) {
          const c = this.tradColor(t);
          if (!c.startsWith('#')) return '';
          return `color:${c};background:${hexToRgba(c, 0.15)};border-color:${hexToRgba(c, 0.3)}`;
        },

        corpusBadgeStyle(corpus, tradition) {
          const c = this.tradColor(tradition);
          if (!c.startsWith('#')) return '';
          return `color:${c};background:${hexToRgba(c, 0.08)};border-color:${hexToRgba(c, 0.2)}`;
        },

        shortName(name) {
          return name.replace(/\s*\([^)]+\)\s*$/, '').replace(/^Bible\s*[—-]\s*/, '');
        },

        // ---- Filters ----

        toggleTradition(t) {
          const next = !this.tradEnabled[t];
          this.tradEnabled = { ...this.tradEnabled, [t]: next };
          const updated = { ...this.corpusEnabled };
          this.corpora.filter(c => c.tradition === t)
            .forEach(c => { updated[c.corpus] = next; });
          this.corpusEnabled = updated;
        },

        toggleCorpus(corpus, tradition) {
          const next = !this.corpusEnabled[corpus];
          this.corpusEnabled = { ...this.corpusEnabled, [corpus]: next };
          if (next && tradition && !this.tradEnabled[tradition]) {
            this.tradEnabled = { ...this.tradEnabled, [tradition]: true };
          }
        },

        // ---- Search ----

        async doVerseSearch() {
          const ref = this.refInput.trim();
          if (!ref || !this.acValid) return;
          this.acOpen = false;
          this.lastParams = { type: 'verse', corpus: this.selectedCorpus, ref };
          await this.startSearch();
        },

        async doTextSearch() {
          const q = this.queryInput.trim();
          if (!q) return;
          this.sourceVerse = null;
          this.lastParams = { type: 'text', q };
          await this.startSearch();
        },

        async startSearch() {
          this.cards = [];
          this.apiOffset = 0;
          this.apiHasMore = true;
          this.errorMsg = '';
          this.searched = true;
          this.loading = true;
          try {
            await this._loadMore();
          } catch (e) {
            this.errorMsg = e.message;
          } finally {
            this.loading = false;
            this._scrollTo('results-anchor', 800);
          }
        },

        async loadMore() {
          this.loading = true;
          try {
            await this._loadMore();
          } catch (e) {
            this.errorMsg = e.message;
          } finally {
            this.loading = false;
          }
        },

        async _loadMore() {
          if (!this.apiHasMore) return;
          const batch = await this._fetchBatch(this.apiOffset);
          this.apiOffset += batch.length;
          this.apiHasMore = batch.length === this.PAGE_SIZE;
          this.cards = [...this.cards, ...batch];
        },

        async _fetchBatch(offset) {
          const p = this.lastParams;
          const enabledCorpora = Object.entries(this.corpusEnabled)
            .filter(([, v]) => v).map(([k]) => k);

          let params;
          if (p.type === 'verse') {
            params = new URLSearchParams({ corpus: p.corpus, ref: p.ref, limit: this.PAGE_SIZE, offset });
          } else {
            params = new URLSearchParams({ q: p.q, limit: this.PAGE_SIZE, offset });
          }
          enabledCorpora.forEach(c => params.append('corpora', c));

          const resp = await fetch((p.type === 'verse' ? '/verse?' : '/search?') + params);
          if (!resp.ok) throw new Error((await resp.json()).detail || resp.statusText);
          return resp.json();
        },

        // ---- Autocomplete ----

        async _acFetch(q, limit) {
          if (!this.selectedCorpus) return;
          try {
            const params = new URLSearchParams({ corpus: this.selectedCorpus, q, limit });
            const items = await fetch('/refs?' + params).then(r => r.json());
            this.acItems = items;
            this.acActive = -1;
            this.acOpen = items.length > 0;
          } catch { this.acOpen = false; }
        },

        acFocus() {
          if (!this.refInput.trim()) this._acFetch('', 3);
        },

        acInput() {
          this.acValid = false;
          clearTimeout(this._acTimer);
          const val = this.refInput.trim();
          if (!val) { this._acFetch('', 3); return; }
          this._acTimer = setTimeout(() => this._acFetch(val, 20), 180);
        },

        acKeydown(e) {
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (this.acOpen) this.acActive = Math.min(this.acActive + 1, this.acItems.length - 1);
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (this.acOpen) this.acActive = Math.max(this.acActive - 1, -1);
          } else if (e.key === 'Enter') {
            if (this.acOpen && this.acActive >= 0) {
              e.preventDefault();
              this.acSelect(this.acItems[this.acActive]);
            } else {
              this.acOpen = false;
              this.doVerseSearch();
            }
          } else if (e.key === 'Escape') {
            this.acOpen = false;
          }
        },

        _scrollTo(id, duration = 600) {
          const el = document.getElementById(id);
          if (!el) return;
          const start = window.scrollY;
          const target = el.getBoundingClientRect().top + start - 16;
          const diff = target - start;
          let startTime = null;
          const ease = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
          function step(ts) {
            if (!startTime) startTime = ts;
            const t = Math.min((ts - startTime) / duration, 1);
            window.scrollTo(0, start + diff * ease(t));
            if (t < 1) requestAnimationFrame(step);
          }
          requestAnimationFrame(step);
        },

        acSelect(item) {
          this.refInput = item;
          this.acValid = true;
          this.acOpen = false;
          this.sourceVerse = null;
          fetch('/passage?' + new URLSearchParams({ corpus: this.selectedCorpus, ref: item }))
            .then(r => r.ok ? r.json() : null)
            .then(d => { if (d) this.sourceVerse = d; })
            .catch(() => { });
        },
      };
    }
  </script>
